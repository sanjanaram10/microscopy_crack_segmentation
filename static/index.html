<!-- static/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Crack Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            background: #f9f9f9;
        }
        h1 { color: #333; }
        .upload-area {
            border: 2px dashed #aaa;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            background: white;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: #666; }
        .results {
            display: flex;
            gap: 30px;
            margin-top: 24px;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
        }
        canvas {
            display: block;
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        #tooltip {
            position: fixed;
            background: rgba(0,0,0,0.82);
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            line-height: 1.6;
        }
        #stats {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 20px;
            font-size: 14px;
        }
        #stats h3 { margin-top: 0; }
        .loading {
            display: none;
            margin-top: 16px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Crack Detection Analysis</h1>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>Click to upload an image — hover over detected cracks to see metrics</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <p class="loading" id="loading">Analyzing image, please wait...</p>

    <div id="stats" style="display:none">
        <h3>Summary</h3>
        <p>Total cracks detected: <strong id="crackCount">-</strong></p>
    </div>

    <div class="results">
        <div>
            <h3>Original</h3>
            <div class="image-wrapper">
                <canvas id="originalCanvas"></canvas>
            </div>
        </div>
        <div>
            <h3>Analyzed — hover over cracks</h3>
            <div class="image-wrapper">
                <canvas id="resultCanvas"></canvas>
            </div>
        </div>
    </div>

    <div id="tooltip"></div>

    <script>
        let crackData = [];
        let canvasScale = { x: 1, y: 1 };

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show original image on canvas
            const originalCanvas = document.getElementById('originalCanvas');
            const origCtx = originalCanvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                originalCanvas.width = img.width;
                originalCanvas.height = img.height;
                origCtx.drawImage(img, 0, 0);
            };
            img.src = URL.createObjectURL(file);

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('stats').style.display = 'none';

            // Send to backend
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('loading').style.display = 'none';

            // Draw result image on canvas
            const resultCanvas = document.getElementById('resultCanvas');
            const resultCtx = resultCanvas.getContext('2d');
            const resultImg = new Image();
            resultImg.onload = () => {
                resultCanvas.width = resultImg.width;
                resultCanvas.height = resultImg.height;
                resultCtx.drawImage(resultImg, 0, 0);

                // Store scale factors in case canvas is CSS-scaled
                const rect = resultCanvas.getBoundingClientRect();
                canvasScale = {
                    x: resultImg.width / rect.width,
                    y: resultImg.height / rect.height
                };
            };
            resultImg.src = 'data:image/png;base64,' + data.image_b64;

            // Store crack metadata for hover
            crackData = data.cracks;

            // Show summary
            document.getElementById('crackCount').textContent = data.crack_count;
            document.getElementById('stats').style.display = 'block';
        });

        // Hover detection on result canvas
        document.getElementById('resultCanvas').addEventListener('mousemove', (e) => {
            const canvas = document.getElementById('resultCanvas');
            const rect = canvas.getBoundingClientRect();

            // Convert mouse position to image coordinates
            const mouseX = (e.clientX - rect.left) * canvasScale.x;
            const mouseY = (e.clientY - rect.top) * canvasScale.y;

            const tooltip = document.getElementById('tooltip');
            let hoveredCrack = null;

            // Check if mouse is inside any crack's bounding box
            for (const crack of crackData) {
                const [bx, by, bw, bh] = crack.bbox;
                if (mouseX >= bx && mouseX <= bx + bw &&
                    mouseY >= by && mouseY <= by + bh) {
                    hoveredCrack = crack;
                    break;
                }
            }

            if (hoveredCrack) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 14) + 'px';
                tooltip.style.top  = (e.clientY - 10) + 'px';
                tooltip.innerHTML = `
                    <strong>Crack #${hoveredCrack.id + 1}</strong><br>
                    Area: ${hoveredCrack.area_px.toLocaleString()} px²<br>
                    Perimeter: ${hoveredCrack.perimeter_px.toLocaleString()} px<br>
                    Confidence: ${(hoveredCrack.score * 100).toFixed(1)}%
                `;
            } else {
                tooltip.style.display = 'none';
            }
        });

        document.getElementById('resultCanvas').addEventListener('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
        });
    </script>
</body>
</html>
