<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Crack Detection</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; cursor: pointer; }
        .results { display: flex; gap: 20px; margin-top: 20px; }
        img { max-width: 100%; }
        #stats { background: #f5f5f5; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Crack Detection Analysis</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>Click to upload an image or drag and drop</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <div id="stats" style="display:none">
        <h3>Results</h3>
        <p>Cracks detected: <strong id="crackCount">-</strong></p>
    </div>

    <div class="results">
        <div>
            <h3>Original</h3>
            <img id="originalImg" style="display:none">
        </div>
        <div>
            <h3>Analyzed</h3>
            <img id="resultImg" style="display:none">
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show original image
            const originalUrl = URL.createObjectURL(file);
            document.getElementById('originalImg').src = originalUrl;
            document.getElementById('originalImg').style.display = 'block';

            // Send to backend
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/analyze', {
                method: 'POST',
                body: formData
            });

            // Show result
            const blob = await response.blob();
            const resultUrl = URL.createObjectURL(blob);
            document.getElementById('resultImg').src = resultUrl;
            document.getElementById('resultImg').style.display = 'block';

            // Show stats
            const crackCount = response.headers.get('X-Crack-Count');
            document.getElementById('crackCount').textContent = crackCount;
            document.getElementById('stats').style.display = 'block';
        });
    </script>
</body>
</html>
